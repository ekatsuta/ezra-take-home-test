services:
  backend:
    build: ./backend
    container_name: task-api-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: task-api-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
