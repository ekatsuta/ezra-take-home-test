services:
  backend-dotnet:
    build: ./backend-dotnet
    container_name: task-api-backend-dotnet
    ports:
      - "8000:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8000
      - JWT__SecretKey=your-secret-key-min-32-characters-long-change-in-production
      - ConnectionStrings__DefaultConnection=Data Source=/app/app.db
      - CORS__AllowedOrigins__0=http://localhost:3000
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: task-api-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-dotnet
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
