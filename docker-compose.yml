services:
  backend:
    build: ./backend
    container_name: task-api-backend
    ports:
      - "8000:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - JWT__SecretKey=${JWT__SecretKey}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - CORS__AllowedOrigins__0=${CORS__AllowedOrigins__0}
      - CORS__AllowedOrigins__1=${CORS__AllowedOrigins__1}
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: task-api-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
